name: 🚀 Deploy CV to AWS

on:
  push:
    branches: 
      - main
  workflow_dispatch:
    
permissions:
  contents: read
  id-token: write  # if you prefer OIDC with role assumption
  
env:
  NODE_VERSION: '20'
  BUCKET_NAME: portfolio-faycal-site-bucket-cv 
  AWS_REGION: 'eu-west-3'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build application
      run: npm run build

    - name: 📋 Setup AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

    - name: 📤 Deploy to S3
      run: |
        aws s3 sync ./out s3://$BUCKET_NAME \
          --delete \
          --exclude "_next/*" \
          --cache-control "public, max-age=300"
    
    - name: Upload Next static assets with long cache
      run: |
          if [ -d out/_next ]; then
            aws s3 cp ./out/_next s3://$BUCKET_NAME/_next --recursive \
              --cache-control "public, max-age=31536000, immutable" \
              --metadata-directive REPLACE
          fi        
    - name: (Optional) Upload static assets with long cache
      if: ${{ hashFiles('out/static/**') != '' }}
      run: |
        aws s3 cp ./out/static s3://$BUCKET_NAME/static --recursive \
          --cache-control "public, max-age=31536000, immutable" \
          --metadata-directive REPLACE

    - name: 🔍 Lookup CloudFront distribution by S3 origin
      id: cf
      run: |
        DIST_ID=$(aws cloudfront list-distributions \
          --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${BUCKET_NAME}')]].Id | [0]" \
          --output text)
        if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
          echo "❌ Aucune distribution CloudFront trouvée pour le bucket ${BUCKET_NAME}"
          exit 1
        fi
        echo "✅ Distribution trouvée : $DIST_ID"
        echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

    - name: 🔄 Invalidate CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ steps.cf.outputs.dist_id }} \
          --paths "/*"
          
    - name: ✅ Deploy success
      run: echo "🎉 CV déployé avec succès sur AWS!"
